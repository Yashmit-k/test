<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My App</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
    button { padding: 10px 20px; background: #0066cc; color: white; border: none;
             border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:hover { background: #0052a3; }
    #result { margin-top: 20px; background: #f4f4f4; padding: 16px;
              border-radius: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Full-Stack Demo</h1>
  <p>Click below to fetch data from your EC2 backend.</p>
  <!-- ⚠️ Replace YOUR_EC2_PUBLIC_IP with your actual EC2 IP -->
  <button onclick="fetchData()">Fetch from Backend</button>
  <div id="result">Results will appear here...</div>

  <script>
    const BACKEND_URL = 'http://YOUR_EC2_PUBLIC_IP:3000';

    async function fetchData() {
      document.getElementById('result').textContent = 'Loading...';
      try {
        const res = await fetch(`${BACKEND_URL}/api/data`);
        const data = await res.json();
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById('result').textContent = 'Error: ' + err.message;
      }
    }
  </script>
</body>
</html>
